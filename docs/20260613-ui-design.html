<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradingAssistant Terminal Prototype</title>
<style>
:root {
  --bg: #030508;
  --surface: #070b0f;
  --surface-2: #0b1117;
  --surface-3: #0e151d;
  --surface-4: #121c26;
  --line: #17212b;
  --line-2: #22303d;
  --text: #e2e8ef;
  --text-soft: #9da9b5;
  --text-dim: #65707c;
  --amber: #ffb347;
  --blue: #6aa7ff;
  --cyan: #6fd4e6;
  --green: #42d48f;
  --red: #ff6f61;
  --mono: "Consolas", "SFMono-Regular", "Courier New", monospace;
  --sans: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

body {
  display: grid;
  grid-template-rows: 48px minmax(0, 1fr);
}

button,
input {
  font: inherit;
  color: inherit;
  background: none;
  border: 0;
  outline: none;
}

button { cursor: pointer; }

.topbar {
  display: grid;
  grid-template-columns: 270px minmax(0, 1fr) 470px;
  align-items: stretch;
  border-bottom: 1px solid var(--line-2);
  background: var(--surface);
}

.topbar-block {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 14px;
  border-right: 1px solid var(--line);
  min-width: 0;
}

.topbar-block:last-child {
  border-right: 0;
  justify-content: flex-end;
}

.brand-lockup {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand-tag {
  color: var(--amber);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.brand-sub {
  color: var(--text-dim);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.live-pill {
  padding: 3px 6px;
  border: 1px solid #22543a;
  color: var(--green);
  font: 700 10px var(--mono);
  letter-spacing: 0.06em;
}

.macro-strip,
.quote-strip {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
  overflow: hidden;
}

.macro-item,
.quote-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
  white-space: nowrap;
  text-transform: uppercase;
}

.macro-item span,
.quote-item span {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.macro-item strong,
.quote-item strong {
  font-size: 12px;
  color: var(--text);
  font-family: var(--mono);
  font-weight: 700;
}

.workspace {
  min-height: 0;
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr) 376px;
}

.left-column,
.center-column,
.right-column {
  min-height: 0;
  display: grid;
  border-right: 1px solid var(--line);
}

.right-column {
  border-right: 0;
  background: var(--surface);
}

.left-column {
  grid-template-rows: minmax(0, 1.12fr) minmax(0, 0.9fr) 214px;
  background: var(--surface-2);
}

.center-column {
  grid-template-rows: 92px 40px 40px minmax(0, 1fr) 250px;
  background: #060a0e;
}

.right-column {
  grid-template-rows: 318px minmax(0, 1fr) 232px;
}

.panel {
  min-height: 0;
  display: grid;
  grid-template-rows: 36px minmax(0, 1fr);
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}

.panel:last-child {
  border-bottom: 0;
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 10px 0 12px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.panel-head strong {
  color: var(--text-soft);
  font-weight: 700;
  font-size: 11px;
}

.head-actions,
.inline-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.scroll {
  min-height: 0;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: #263342 #0d1319;
}

.scroll::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.scroll::-webkit-scrollbar-track {
  background: #0b1117;
}

.scroll::-webkit-scrollbar-thumb {
  background: #263342;
}

.panel-fill {
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}

.ticker-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 68px;
  gap: 8px;
  padding: 10px;
  border-bottom: 1px solid var(--line);
}

.ticker-input {
  height: 30px;
  border: 1px solid var(--line-2);
  background: #04070b;
  padding: 0 9px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
}

.ticker-input::placeholder { color: #5b6875; }

.primary-button,
.chip-button {
  height: 30px;
  border: 1px solid var(--line-2);
  background: #10161d;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 10px;
}

.primary-button:hover,
.chip-button:hover {
  border-color: #405061;
  color: var(--text);
}

.primary-button { color: var(--amber); }

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 12px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
  overflow: hidden;
}

.control-row.secondary { background: #0b1016; }

.control-group {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
  overflow: auto hidden;
}

.control {
  height: 26px;
  padding: 0 9px;
  border: 1px solid var(--line);
  background: #10161d;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 10px;
  font-family: var(--mono);
  flex: 0 0 auto;
}

.control.is-active {
  color: var(--amber);
  border-color: #59697a;
  background: #141b23;
}

.instrument-strip {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 520px;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: #090d12;
}

.instrument-main {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  min-width: 0;
}

.instrument-copy {
  min-width: 0;
}

.instrument-copy h1 {
  margin: 0;
  font-size: 25px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0.03em;
}

.instrument-copy p {
  margin: 7px 0 0;
  color: var(--text-soft);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.price-stack {
  display: flex;
  align-items: baseline;
  gap: 10px;
  min-width: 0;
}

.price-stack .last {
  font-size: 30px;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: 0.02em;
}

.price-stack .change {
  font-size: 14px;
  font-family: var(--mono);
}

.instrument-metrics {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border-left: 1px solid var(--line);
}

.metric-cell {
  padding: 7px 10px;
  border-right: 1px solid var(--line);
}

.metric-cell:last-child { border-right: 0; }

.metric-cell .k {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.metric-cell .v {
  margin-top: 6px;
  font-size: 13px;
  font-family: var(--mono);
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}

.chart-shell {
  min-height: 0;
  display: grid;
  grid-template-rows: 34px minmax(0, 1fr) 28px;
  border-bottom: 1px solid var(--line);
  background: #070b10;
}

.chart-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 12px;
  border-bottom: 1px solid var(--line);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.chart-title {
  color: var(--text-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chart-legend {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
  overflow: auto hidden;
  font-family: var(--mono);
  color: var(--text-soft);
}

.legend-item { white-space: nowrap; }

.chart-stage {
  position: relative;
  min-height: 0;
  background:
    linear-gradient(rgba(28, 38, 50, 0.7) 1px, transparent 1px),
    linear-gradient(90deg, rgba(28, 38, 50, 0.7) 1px, transparent 1px),
    #06090d;
  background-size: 100% 20%, 8.333% 100%, auto;
}

.chart-stage svg,
.study-chart svg {
  width: 100%;
  height: 100%;
  display: block;
}

.chart-footer {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  padding: 0 16px;
  border-top: 1px solid var(--line);
  background: #090d12;
  color: var(--text-dim);
  font: 11px var(--mono);
}

.chart-footer span {
  display: flex;
  align-items: center;
  justify-content: center;
}

.study-shell {
  min-height: 0;
  display: grid;
  grid-template-rows: 32px minmax(0, 1fr);
  background: #091017;
}

.study-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 12px;
  border-bottom: 1px solid var(--line);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
}

.study-panels {
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}

.study-card {
  min-height: 0;
  display: grid;
  grid-template-rows: 34px minmax(0, 1fr) 44px;
  border-right: 1px solid var(--line);
  background: #0b1118;
}

.study-card:last-child { border-right: 0; }

.study-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 0 10px;
  border-bottom: 1px solid #15202a;
}

.study-name {
  font-size: 11px;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.study-value { font: 700 12px var(--mono); }

.study-chart {
  position: relative;
  min-height: 0;
  background:
    linear-gradient(rgba(28, 38, 50, 0.55) 1px, transparent 1px),
    linear-gradient(90deg, rgba(28, 38, 50, 0.55) 1px, transparent 1px);
  background-size: 100% 25%, 20% 100%;
}

.study-foot {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid #15202a;
}

.study-foot span {
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-right: 1px solid #15202a;
}

.study-foot span:nth-child(2n) { border-right: 0; }

.table-list { min-height: 0; }

.watch-row,
.mover-row,
.tape-row,
.signal-row,
.news-row {
  display: grid;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid #141d27;
  font-size: 11px;
}

.watch-row {
  grid-template-columns: minmax(0, 1fr) 92px 64px;
  cursor: pointer;
  background: #0b1118;
}

.watch-row.is-active {
  background: #141c25;
  box-shadow: inset 2px 0 0 var(--amber);
}

.watch-row:hover { background: #101720; }

.row-main { min-width: 0; }

.row-name {
  color: var(--text);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-meta {
  margin-top: 4px;
  color: var(--text-dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-quote,
.row-change,
.row-volume,
.row-venue {
  font-family: var(--mono);
  text-align: right;
  white-space: nowrap;
}

.mover-row {
  grid-template-columns: minmax(0, 1fr) 74px 76px;
  background: #0b1118;
}

.mover-row strong {
  color: var(--text);
  font-weight: 700;
}

.snapshot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: 88px;
}

.snapshot-cell {
  padding: 10px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: #0b1016;
}

.snapshot-cell:nth-child(2n) { border-right: 0; }

.snapshot-cell .k {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.snapshot-cell .v {
  margin-top: 10px;
  font: 700 17px var(--mono);
  color: var(--text);
}

.snapshot-cell .s {
  margin-top: 8px;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.depth-shell,
.book-shell,
.rail-shell {
  min-height: 0;
  display: grid;
  grid-template-rows: 34px minmax(0, 1fr);
}

.depth-head,
.book-head,
.rail-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 0 10px 0 12px;
  border-bottom: 1px solid var(--line);
  background: #090d12;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.depth-grid {
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 62px 1fr;
  grid-auto-rows: 24px;
  font: 11px var(--mono);
}

.depth-header {
  display: contents;
}

.depth-header div {
  display: flex;
  align-items: center;
  padding: 0 10px;
  border-bottom: 1px solid var(--line);
  color: var(--text-dim);
  background: #081018;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 10px;
}

.depth-header div:nth-child(2) {
  justify-content: center;
}

.depth-row {
  display: contents;
}

.depth-cell {
  position: relative;
  display: flex;
  align-items: center;
  padding: 0 10px;
  border-bottom: 1px solid #141d27;
  overflow: hidden;
}

.depth-cell.price {
  justify-content: center;
  color: var(--text-soft);
  background: #081018;
}

.depth-bar {
  position: absolute;
  top: 3px;
  bottom: 3px;
  opacity: 0.18;
}

.depth-bar.bid {
  right: 0;
  background: linear-gradient(90deg, transparent, var(--green));
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
}

.depth-bar.ask {
  left: 0;
  background: linear-gradient(90deg, var(--red), transparent);
  clip-path: polygon(0 0, 100% 0, 0 100%);
}

.depth-text {
  position: relative;
  z-index: 1;
  width: 100%;
}

.depth-text.bid {
  text-align: right;
  color: var(--green);
}

.depth-text.ask {
  text-align: left;
  color: var(--red);
}

.book-table,
.rail-list {
  min-height: 0;
}

.book-header,
.book-row,
.tape-row {
  display: grid;
  grid-template-columns: 76px 72px 1fr 72px 76px;
  gap: 8px;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid #141d27;
  font: 11px var(--mono);
}

.book-header {
  color: var(--text-dim);
  background: #081018;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 10px;
}

.book-row span,
.tape-row span {
  white-space: nowrap;
}

.book-row .center,
.tape-row .center {
  text-align: center;
  color: var(--text-soft);
}

.book-row .right,
.book-header .right,
.tape-row .right,
.book-row .left,
.book-header .left,
.tape-row .left {
  text-align: right;
}

.tape-row {
  grid-template-columns: 62px 76px 1fr 54px;
  font-size: 11px;
}

.signal-row,
.news-row {
  background: #0b1118;
}

.signal-row strong,
.news-row strong {
  color: var(--text);
  font-size: 12px;
}

.signal-row p,
.news-row p {
  margin: 2px 0 0;
  color: var(--text-dim);
  font-size: 10px;
  line-height: 1.45;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.analysis-row {
  display: grid;
  gap: 10px;
  padding: 10px;
  border-bottom: 1px solid #141d27;
  background: #0b1118;
}

.analysis-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.analysis-title-block {
  min-width: 0;
}

.analysis-title {
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.analysis-subtitle {
  margin-top: 4px;
  color: var(--text-dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.analysis-stamp {
  flex: 0 0 auto;
  padding: 2px 6px;
  border: 1px solid #2b3846;
  color: var(--amber);
  font: 700 10px var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.analysis-body {
  color: var(--text-soft);
  font-size: 11px;
  line-height: 1.55;
}

.analysis-metrics {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  border: 1px solid #18232d;
  background: #081018;
}

.analysis-metric {
  padding: 6px 8px;
  border-right: 1px solid #18232d;
}

.analysis-metric:last-child {
  border-right: 0;
}

.analysis-metric-label {
  display: block;
  color: var(--text-dim);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.analysis-metric-value {
  display: block;
  margin-top: 4px;
  color: var(--text);
  font: 700 11px var(--mono);
}

.text-up { color: var(--green); }
.text-down { color: var(--red); }
.text-amber { color: var(--amber); }
.text-blue { color: var(--blue); }
.text-soft { color: var(--text-soft); }
.text-dim { color: var(--text-dim); }

.empty-note {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

@media (max-width: 1400px) {
  .workspace {
    grid-template-columns: 240px minmax(0, 1fr) 340px;
  }

  .instrument-strip {
    grid-template-columns: minmax(0, 1fr) 430px;
  }

  .instrument-metrics {
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }
}
@media (max-width: 1180px) {
  html,
  body {
    min-width: 1180px;
    overflow: hidden;
  }
}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-block">
    <div class="brand-lockup">
      <div>
        <div class="brand-tag">TradingAssistant / Terminal</div>
        <div class="brand-sub">Wall Street Market Workspace</div>
      </div>
      <div class="live-pill">LIVE</div>
    </div>
  </div>
  <div class="topbar-block">
    <div class="macro-strip" id="macroStrip"></div>
  </div>
  <div class="topbar-block">
    <div class="quote-strip" id="quoteStrip"></div>
  </div>
</header>

<main class="workspace">
  <aside class="left-column">
    <section class="panel">
      <div class="panel-head">
        <strong>Watchlist</strong>
        <div class="head-actions">
          <button class="chip-button" id="watchSortButton" type="button">By Code</button>
        </div>
      </div>
      <div class="panel-fill">
        <form class="ticker-form" id="tickerForm">
          <input class="ticker-input" id="tickerInput" type="text" placeholder="Add code: US.NVDA" autocomplete="off" />
          <button class="primary-button" type="submit">Add</button>
        </form>
        <div class="scroll table-list" id="watchlistPanel"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <strong>Market Movers</strong>
        <div class="head-actions">
          <button class="chip-button" data-movers-tab="leaders" type="button">Leaders</button>
          <button class="chip-button" data-movers-tab="laggards" type="button">Laggards</button>
        </div>
      </div>

function hashString(input) {
  let h = 2166136261;
  for (let i = 0; i < input.length; i += 1) {
    h ^= input.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function createRandom(seed) {
  let value = seed >>> 0;
  return function next() {
    value = (Math.imul(value, 1664525) + 1013904223) >>> 0;
    return value / 4294967296;
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function formatNumber(value, digits = 2) {
  return Number(value).toFixed(digits);
}

function formatSigned(value, digits = 2, suffix = "") {
  const prefix = value >= 0 ? "+" : "";
  return `${prefix}${Number(value).toFixed(digits)}${suffix}`;
}

function average(series, start, end) {
  let total = 0;
  let count = 0;
  for (let i = start; i <= end; i += 1) {
    if (series[i] !== undefined) {
      total += series[i];
      count += 1;
    }
  }
  return count ? total / count : series[end] || 0;
}

function ema(series, period) {
  const alpha = 2 / (period + 1);
  const result = [];
  let prev = series[0];
  for (let i = 0; i < series.length; i += 1) {
    prev = i === 0 ? series[i] : alpha * series[i] + (1 - alpha) * prev;
    result.push(prev);
  }
  return result;
}

function generateTickerMeta(code) {
  if (KNOWN_TICKERS[code]) {
    return { code, ...KNOWN_TICKERS[code] };
  }
  const seed = hashString(code);
  const rand = createRandom(seed);
  const venue = code.split(".")[0] || "US";
  const suffix = code.split(".")[1] || code;
  return {
    code,
    name: `${suffix} Holdings`,
    venue,
    sector: ["Industrials", "Financials", "Energy", "Healthcare"][seed % 4],
    currency: venue === "HK" ? "HKD" : "USD",
    note: "User added static mock",
    base: 20 + rand() * 420
  };
}

function generateSeries(code, scale) {
  const meta = generateTickerMeta(code);
  const seed = hashString(`${code}|${scale}`);
  const rand = createRandom(seed);
  const points = scale === "1Y" ? 72 : scale === "1MO" ? 64 : scale === "1W" ? 56 : 48;
  const candles = [];
  let price = meta.base;
  let volumeBase = 120000 + rand() * 900000;
  for (let i = 0; i < points; i += 1) {
    const drift = (rand() - 0.44) * meta.base * 0.012;
    const swing = (rand() - 0.5) * meta.base * 0.022;
    const open = price;
    const close = clamp(open + drift + swing, meta.base * 0.45, meta.base * 1.65);
    const high = Math.max(open, close) + rand() * meta.base * 0.018;
    const low = Math.min(open, close) - rand() * meta.base * 0.018;
    const volume = Math.round(volumeBase * (0.55 + rand() * 1.3));
    const delta = Math.round(volume * ((rand() - 0.46) * 0.42));
    candles.push({ open, high, low, close, volume, delta });
    price = close;
    volumeBase *= 0.992 + rand() * 0.018;
  }
  return candles;
}

function deriveAnalytics(candles) {
  const closes = candles.map(item => item.close);
  const highs = candles.map(item => item.high);
  const lows = candles.map(item => item.low);
  const volumes = candles.map(item => item.volume);
  const ma5 = closes.map((_, i) => average(closes, Math.max(0, i - 4), i));
  const ma20 = closes.map((_, i) => average(closes, Math.max(0, i - 19), i));
  const ma60 = closes.map((_, i) => average(closes, Math.max(0, i - 39), i));
  const ema12 = ema(closes, 12);
  const ema26 = ema(closes, 26);
  const bollMid = ma20;
  const bollStd = closes.map((_, i) => {
    const start = Math.max(0, i - 19);
    const mean = average(closes, start, i);
    let total = 0;
    let count = 0;
    for (let x = start; x <= i; x += 1) {
      total += (closes[x] - mean) ** 2;
      count += 1;
    }
    return Math.sqrt(total / Math.max(count, 1));
  });
  const bollUpper = bollMid.map((v, i) => v + bollStd[i] * 2);
  const bollLower = bollMid.map((v, i) => v - bollStd[i] * 2);
  let pv = 0;
  let vv = 0;
  const vwap = candles.map(item => {
    const typical = (item.high + item.low + item.close) / 3;
    pv += typical * item.volume;
    vv += item.volume;
    return pv / vv;
  });
  const tr = candles.map((item, i) => {
    if (i === 0) return item.high - item.low;
    const prevClose = candles[i - 1].close;
    return Math.max(item.high - item.low, Math.abs(item.high - prevClose), Math.abs(item.low - prevClose));
  });
  const atr = tr.map((_, i) => average(tr, Math.max(0, i - 13), i));
  const macdLine = ema12.map((v, i) => v - ema26[i]);
  const macdSignal = ema(macdLine, 9);
  const macdHist = macdLine.map((v, i) => v - macdSignal[i]);
  let gain = 0;
  let loss = 0;
  const rsi = closes.map((value, i) => {
    if (i === 0) return 50;
    const delta = value - closes[i - 1];
    gain = (gain * 13 + Math.max(delta, 0)) / 14;
    loss = (loss * 13 + Math.max(-delta, 0)) / 14;
    if (loss === 0) return 100;
    const rs = gain / loss;
    return 100 - 100 / (1 + rs);
  });
  const obv = [];
  let obvRunning = 0;
  closes.forEach((close, i) => {
    if (i > 0) {
      obvRunning += close >= closes[i - 1] ? volumes[i] : -volumes[i];
    }
    obv.push(obvRunning);
  });
  return { closes, highs, lows, volumes, ma5, ma20, ma60, ema12, ema26, bollUpper, bollMid, bollLower, vwap, atr, macdHist, macdLine, macdSignal, rsi, obv };
}

function buildModel(code, scale) {
  const meta = generateTickerMeta(code);
  const candles = generateSeries(code, scale);
  const analytics = deriveAnalytics(candles);
  const last = candles[candles.length - 1];
  const first = candles[0];
  const prevClose = candles[candles.length - 2]?.close || first.open;
  const changeValue = last.close - prevClose;
  const changePct = (changeValue / prevClose) * 100;
  const high = Math.max(...candles.map(item => item.high));
  const low = Math.min(...candles.map(item => item.low));
  const volume = candles.reduce((sum, item) => sum + item.volume, 0);
  const turnover = volume * last.close;
  return { meta, candles, analytics, last, first, prevClose, changeValue, changePct, high, low, volume, turnover };
}
function compactVolume(value) {
  if (value >= 1e9) return `${formatNumber(value / 1e9, 2)}B`;
  if (value >= 1e6) return `${formatNumber(value / 1e6, 2)}M`;
  if (value >= 1e3) return `${formatNumber(value / 1e3, 1)}K`;
  return String(Math.round(value));
}

function classForNumber(value) {
  return value >= 0 ? "text-up" : "text-down";
}

function makeButton(label, active, attrs = "") {
  return `<button class="control${active ? " is-active" : ""}" type="button" ${attrs}>${label}</button>`;
}

function linePath(series, min, max, width, height) {
  return series.map((value, index) => {
    const x = (index / Math.max(series.length - 1, 1)) * width;
    const y = height - ((value - min) / Math.max(max - min, 0.0001)) * height;
    return `${index === 0 ? "M" : "L"}${x.toFixed(2)} ${y.toFixed(2)}`;
  }).join(" ");
}

function histogramBars(series, min, max, width, height) {
  const barWidth = width / Math.max(series.length, 1);
  return series.map((value, index) => {
    const x = index * barWidth + barWidth * 0.18;
    const zeroY = height - ((0 - min) / Math.max(max - min, 0.0001)) * height;
    const valueY = height - ((value - min) / Math.max(max - min, 0.0001)) * height;
    const top = Math.min(zeroY, valueY);
    const barHeight = Math.max(Math.abs(valueY - zeroY), 1);
    const color = value >= 0 ? "#42d48f" : "#ff6f61";
    return `<rect x="${x.toFixed(2)}" y="${top.toFixed(2)}" width="${(barWidth * 0.64).toFixed(2)}" height="${barHeight.toFixed(2)}" fill="${color}" opacity="0.72"></rect>`;
  }).join("");
}

function renderChart(model) {
  const { candles, analytics } = model;
  const width = 1000;
  const height = 420;
  const allValues = candles.flatMap(item => [item.high, item.low]);
  if (state.overlays.has("BOLL")) {
    allValues.push(...analytics.bollUpper, ...analytics.bollLower);
  }
  const min = Math.min(...allValues);
  const max = Math.max(...allValues);
  const candleWidth = width / candles.length;
  const toY = value => height - ((value - min) / Math.max(max - min, 0.0001)) * height;

  const candleSvg = candles.map((item, index) => {
    const x = index * candleWidth + candleWidth / 2;
    const openY = toY(item.open);
    const closeY = toY(item.close);
    const highY = toY(item.high);
    const lowY = toY(item.low);
    const top = Math.min(openY, closeY);
    const bodyHeight = Math.max(Math.abs(closeY - openY), 1.2);
    const fill = item.close >= item.open ? "#42d48f" : "#ff6f61";
    return `
      <line x1="${x.toFixed(2)}" y1="${highY.toFixed(2)}" x2="${x.toFixed(2)}" y2="${lowY.toFixed(2)}" stroke="${fill}" stroke-width="1.1"></line>
      <rect x="${(x - candleWidth * 0.27).toFixed(2)}" y="${top.toFixed(2)}" width="${(candleWidth * 0.54).toFixed(2)}" height="${bodyHeight.toFixed(2)}" fill="${fill}" opacity="0.92"></rect>
    `;
  }).join("");

  const overlays = [];
  const legend = [];
  if (state.overlays.has("MA")) {
    overlays.push(`<path d="${linePath(analytics.ma5, min, max, width, height)}" fill="none" stroke="#ffb347" stroke-width="1.6"></path>`);
    overlays.push(`<path d="${linePath(analytics.ma20, min, max, width, height)}" fill="none" stroke="#6aa7ff" stroke-width="1.4"></path>`);
    overlays.push(`<path d="${linePath(analytics.ma60, min, max, width, height)}" fill="none" stroke="#6fd4e6" stroke-width="1.2"></path>`);
    legend.push(["MA5", analytics.ma5.at(-1), "text-amber"], ["MA20", analytics.ma20.at(-1), "text-blue"], ["MA60", analytics.ma60.at(-1), "text-soft"]);
  }
  if (state.overlays.has("EMA")) {
    overlays.push(`<path d="${linePath(analytics.ema12, min, max, width, height)}" fill="none" stroke="#9ad97b" stroke-width="1.2"></path>`);
    overlays.push(`<path d="${linePath(analytics.ema26, min, max, width, height)}" fill="none" stroke="#f08d49" stroke-width="1.2" stroke-dasharray="5 4"></path>`);
    legend.push(["EMA12", analytics.ema12.at(-1), "text-up"], ["EMA26", analytics.ema26.at(-1), "text-down"]);
  }
  if (state.overlays.has("BOLL")) {
    const upper = linePath(analytics.bollUpper, min, max, width, height);
    const lower = linePath(analytics.bollLower, min, max, width, height);
    const mid = linePath(analytics.bollMid, min, max, width, height);
    overlays.push(`<path d="${upper}" fill="none" stroke="#6fd4e6" stroke-width="1.0" stroke-dasharray="4 3"></path>`);
    overlays.push(`<path d="${lower}" fill="none" stroke="#6fd4e6" stroke-width="1.0" stroke-dasharray="4 3"></path>`);
    overlays.push(`<path d="${mid}" fill="none" stroke="#406c84" stroke-width="1.0"></path>`);
    legend.push(["BOLL U", analytics.bollUpper.at(-1), "text-soft"], ["BOLL M", analytics.bollMid.at(-1), "text-soft"], ["BOLL L", analytics.bollLower.at(-1), "text-soft"]);
  }
  if (state.overlays.has("VWAP")) {
    overlays.push(`<path d="${linePath(analytics.vwap, min, max, width, height)}" fill="none" stroke="#d7dd63" stroke-width="1.1"></path>`);
    legend.push(["VWAP", analytics.vwap.at(-1), "text-amber"]);
  }

  let routeOverlay = "";
  if (state.activeRoute === "orderflow") {
    const maxVol = Math.max(...analytics.volumes);
    routeOverlay = analytics.volumes.map((volume, index) => {
      const barWidth = width / analytics.volumes.length;
      const barHeight = (volume / maxVol) * 82;
      return `<rect x="${(index * barWidth + barWidth * 0.18).toFixed(2)}" y="${(height - barHeight).toFixed(2)}" width="${(barWidth * 0.62).toFixed(2)}" height="${barHeight.toFixed(2)}" fill="#6aa7ff" opacity="0.18"></rect>`;
    }).join("");
  }
  if (state.activeRoute === "micro") {
    routeOverlay = candles.map((item, index) => {
      const barWidth = width / candles.length;
      const x = index * barWidth + barWidth * 0.2;
      const y = height - 28 - Math.abs(item.delta) / 1800;
      const fill = item.delta >= 0 ? "#42d48f" : "#ff6f61";
      return `<rect x="${x.toFixed(2)}" y="${Math.max(y, 120).toFixed(2)}" width="${(barWidth * 0.48).toFixed(2)}" height="20" fill="${fill}" opacity="0.28"></rect>`;
    }).join("");
  }

  document.getElementById("chartTitle").textContent = `${model.meta.code} / ${state.activeRoute.toUpperCase()} / ${state.activeScale}`;
  document.getElementById("chartLegend").innerHTML = legend.map(item => `<span class="legend-item ${item[2]}">${item[0]} ${formatNumber(item[1])}</span>`).join("");
  document.getElementById("chartStage").innerHTML = `
    <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="Primary chart">
      ${routeOverlay}
      ${candleSvg}
      ${overlays.join("")}
    </svg>
  `;
  const footerLabels = Array.from({ length: 6 }, (_, index) => `${state.activeScale} ${index + 1}`);
  document.getElementById("chartFooter").innerHTML = footerLabels.map(label => `<span>${label}</span>`).join("");
}

function buildStudySeries(model, index) {
  const a = model.analytics;
  const route = state.activeRoute;
  if (route === "momentum") {
    return index === 0 ? a.macdHist : index === 1 ? a.rsi : a.macdLine.map((v, i) => v - a.macdSignal[i]);
  }
  if (route === "trend") {
    return index === 0 ? a.ma20.map((v, i) => v - a.ma60[i]) : index === 1 ? a.ema12.map((v, i) => v - a.ema26[i]) : a.ma5.map((v, i) => v - a.ma20[i]);
  }
  if (route === "volatility") {
    return index === 0 ? a.atr : index === 1 ? a.bollUpper.map((v, i) => v - a.bollLower[i]) : a.highs.map((v, i) => v - a.lows[i]);
  }
  if (route === "orderflow") {
    return index === 0 ? model.candles.map(item => item.delta) : index === 1 ? a.obv : model.candles.map(item => item.volume / 1000);
  }
  if (route === "micro") {
    return index === 0 ? model.candles.map(item => (item.high - item.low) * 100) : index === 1 ? model.candles.map(item => item.volume / 2500) : model.candles.map(item => item.delta / 80);
  }
  return index === 0 ? a.ma5.map((v, i) => v - a.ma20[i]) : index === 1 ? model.candles.map(item => item.volume / 1000) : a.vwap.map((v, i) => model.candles[i].close - v);
}

function renderStudies(model) {
  const studies = routeStudies[state.activeRoute];
  document.getElementById("studyTitle").textContent = `${state.activeRoute.toUpperCase()} ROUTE STUDIES`;
  document.getElementById("studySummary").textContent = `${studies.length} linked indicator panes`;
  document.getElementById("studyPanels").innerHTML = studies.map((study, index) => {
    const series = buildStudySeries(model, index);
    const min = Math.min(...series);
    const max = Math.max(...series);
    const width = 320;
    const height = 130;
    const svg = state.activeRoute === "momentum" && index === 0
      ? histogramBars(series, min, max, width, height)
      : `<path d="${linePath(series, min, max, width, height)}" fill="none" stroke="${index === 0 ? "#ffb347" : index === 1 ? "#6aa7ff" : "#42d48f"}" stroke-width="1.8"></path>`;
    return `
      <article class="study-card">
        <div class="study-card-head">
          <span class="study-name">${study.name}</span>
          <span class="study-value ${index === 0 ? "text-amber" : index === 1 ? "text-blue" : "text-up"}">${study.tag}</span>
        </div>
        <div class="study-chart">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${svg}</svg>
        </div>
        <div class="study-foot">
          <span>${study.foot[0]}</span>
          <span>${study.foot[1]}</span>
        </div>
      </article>
    `;
  }).join("");
}

function renderDepth(model) {
  const base = model.last.close;
  const maxSize = 16000;
  const rows = [];
  rows.push(`<div class="depth-header"><div>Bid Size</div><div>Price</div><div>Ask Size</div></div>`);
  for (let i = 9; i >= 0; i -= 1) {
    const price = base + (i - 4.5) * 0.2;
    const bidSize = 2800 + Math.round(Math.abs(Math.sin(i + base)) * 9800);
    const askSize = 2600 + Math.round(Math.abs(Math.cos(i + base)) * 10200);
    const bidRatio = clamp(bidSize / maxSize, 0.1, 1);
    const askRatio = clamp(askSize / maxSize, 0.1, 1);
    const bidLabel = state.depthMode === "profile" ? `${Math.round(bidRatio * 100)}%` : state.depthMode === "imbalance" ? formatSigned((bidSize - askSize) / 1000, 1, "K") : compactVolume(bidSize);
    const askLabel = state.depthMode === "profile" ? `${Math.round(askRatio * 100)}%` : state.depthMode === "imbalance" ? formatSigned((askSize - bidSize) / 1000, 1, "K") : compactVolume(askSize);
    rows.push(`
      <div class="depth-row">
        <div class="depth-cell">
          <div class="depth-bar bid" style="width:${(bidRatio * 100).toFixed(1)}%"></div>
          <div class="depth-text bid">${bidLabel}</div>
        </div>
        <div class="depth-cell price">${formatNumber(price)}</div>
        <div class="depth-cell">
          <div class="depth-bar ask" style="width:${(askRatio * 100).toFixed(1)}%"></div>
          <div class="depth-text ask">${askLabel}</div>
        </div>
      </div>
    `);
  }
  document.getElementById("depthPanel").innerHTML = rows.join("");
}

function renderOrderBook(model) {
  const base = model.last.close;
  const header = `
    <div class="book-header">
      <span class="left">Ask Px</span>
      <span class="left">Ask Sz</span>
      <span class="center">Spread</span>
      <span class="right">Bid Sz</span>
      <span class="right">Bid Px</span>
    </div>
  `;
  const rows = Array.from({ length: 10 }, (_, index) => {
    const askPx = base + (10 - index) * 0.1;
    const bidPx = base - (index + 1) * 0.1;
    const askSz = 3200 + index * 740;
    const bidSz = 3400 + (9 - index) * 820;
    return `
      <div class="book-row">
        <span class="text-down left">${formatNumber(askPx)}</span>
        <span class="text-down left">${compactVolume(askSz)}</span>
        <span class="center">${formatNumber(askPx - bidPx, 2)}</span>
        <span class="text-up right">${compactVolume(bidSz)}</span>
        <span class="text-up right">${formatNumber(bidPx)}</span>
      </div>
    `;
  }).join("");
  document.getElementById("orderBookMeta").textContent = `${state.depthMode.toUpperCase()} VIEW / 10 levels`;
  document.getElementById("orderBookPanel").innerHTML = header + rows;
}

function renderRail(model) {
  if (state.railTab === "analysis") {
    const direction = model.changePct >= 0 ? "Constructive" : "Defensive";
    const confidence = model.changePct >= 0 ? "76" : "61";
    const riskBias = Math.abs(model.changePct) > 1.8 ? "Elevated" : "Measured";
    const cadence = state.activeScale === "30S" || state.activeScale === "1M" ? "Every 5 min" : state.activeScale === "1D" ? "Every 30 min" : "Every 2 hours";
    const analysisCards = [
      {
        title: "AI Regime Read",
        subtitle: `${model.meta.code} / ${state.activeRoute.toUpperCase()} / scheduled push`,
        stamp: "Latest",
        body: `${direction} tone remains intact as price trades ${model.last.close >= model.analytics.vwap.at(-1) ? "above" : "near"} VWAP and the active route still shows supportive internal structure. The desk should treat pullbacks as review points rather than immediate reversals until volume participation fades materially.`,
        metrics: [["Confidence", `${confidence}%`], ["Refresh", cadence], ["Risk", riskBias]]
      },
      {
        title: "Flow And Structure",
        subtitle: "Automated summary / order book + tape + indicators",
        stamp: "Queued",
        body: `Resting depth remains ${model.changePct >= 0 ? "firmer on the bid side" : "more cautious on the offer side"}, while mock execution prints still imply ${model.changePct >= 0 ? "buyers are willing to lift" : "sellers are controlling short-term tempo"}. Technical overlays stay ${state.overlays.size >= 3 ? "well aligned" : "partially aligned"} with the current route selection.`,
        metrics: [["Depth", state.depthMode.toUpperCase()], ["Overlays", `${state.overlays.size} live`], ["Next Push", "14:35"]]
      },
      {
        title: "Risk Notes",
        subtitle: "What the scheduled AI push would flag next",
        stamp: "Watch",
        body: `Monitor for a break ${model.changePct >= 0 ? "back under" : "back above"} the short moving average cluster, a spread expansion beyond the recent average, or a visible slowdown in participation. Any two of these conditions together would downgrade the current view on the next automated analysis cycle.`,
        metrics: [["VWAP Gap", formatSigned(((model.last.close - model.analytics.vwap.at(-1)) / model.analytics.vwap.at(-1)) * 100, 2, "%")], ["ATR", formatNumber(model.analytics.atr.at(-1))], ["Bias", direction.toUpperCase()]]
      }
    ];
    document.getElementById("railPanel").innerHTML = analysisCards.map(card => `
      <section class="analysis-row">
        <div class="analysis-head">
          <div class="analysis-title-block">
            <div class="analysis-title">${card.title}</div>
            <div class="analysis-subtitle">${card.subtitle}</div>
          </div>
          <div class="analysis-stamp">${card.stamp}</div>
        </div>
        <div class="analysis-body">${card.body}</div>
        <div class="analysis-metrics">
          ${card.metrics.map(metric => `
            <div class="analysis-metric">
              <span class="analysis-metric-label">${metric[0]}</span>
              <span class="analysis-metric-value">${metric[1]}</span>
            </div>
          `).join("")}
        </div>
      </section>
    `).join("");
    return;
  }
  if (state.railTab === "tape") {
    const rows = Array.from({ length: 14 }, (_, index) => {
      const side = index % 3 === 0 ? "SELL" : "BUY";
      const price = model.last.close + (index % 5 - 2) * 0.1;
      const size = 400 + index * 180;
      const time = `14:${String(28 + Math.floor(index / 3)).padStart(2, "0")}:${String((index * 7) % 60).padStart(2, "0")}`;
      return `
        <div class="tape-row">
          <span class="${side === "BUY" ? "text-up" : "text-down"}">${formatNumber(price)}</span>
          <span class="right">${compactVolume(size)}</span>
          <span class="center">${time}</span>
          <span class="right ${side === "BUY" ? "text-up" : "text-down"}">${side}</span>
        </div>
      `;
    }).join("");
    document.getElementById("railPanel").innerHTML = rows;
    return;
  }
  if (state.railTab === "signals") {
    const signals = [
      ["Trend continuation", "MA stack remains positively aligned and pullbacks hold above VWAP."],
      ["Liquidity pocket", "Offer depth thins two ticks above last trade while bid queue refills."],
      ["Momentum carry", "MACD and RSI remain constructive on active route settings."],
      ["Execution note", "Simulated child-order slices would favor passive accumulation."]
    ];
    document.getElementById("railPanel").innerHTML = signals.map(item => `
      <div class="signal-row">
        <strong>${item[0]}</strong>
        <p>${item[1]}</p>
      </div>
    `).join("");
    return;
  }
  const news = [
    ["Sector breadth remains concentrated in platform and chip names", "Mock desk wrap / 14:29 / breadth broadens but leadership stays concentrated in liquid growth."],
    ["Macro desk flags stable rates backdrop for risk assets", "Mock rates recap / 14:16 / front-end repricing slows and beta appetite improves."],
    ["Execution commentary sees healthy passive support below market", "Mock market color / 13:58 / queue replenishment remains visible on bid side."],
    ["Fundamental narrative still secondary to positioning impulse", "Mock strategy note / 13:41 / near-term price discovery remains flow-led."]
  ];
  document.getElementById("railPanel").innerHTML = news.map(item => `
    <div class="news-row">
      <strong>${item[0]}</strong>
      <p>${item[1]}</p>
    </div>
  `).join("");
}
function renderAll() {
  const model = buildModel(state.activeCode, state.activeScale);
  renderMacroStrip();
  renderQuoteStrip(model);
  renderWatchlist();
  renderMovers();
  renderSnapshot();
  renderInstrument(model);
  renderControls();
  renderChart(model);
  renderStudies(model);
  renderDepth(model);
  renderOrderBook(model);
  renderRail(model);
}

function normalizeCode(value) {
  return value.trim().toUpperCase().replace(/\s+/g, "");
}

document.getElementById("tickerForm").addEventListener("submit", event => {
  event.preventDefault();
  const input = document.getElementById("tickerInput");
  const code = normalizeCode(input.value);
  if (!code) return;
  if (!state.watchlist.includes(code)) {
    state.watchlist.unshift(code);
  }
  state.activeCode = code;
  input.value = "";
  renderAll();
});

document.querySelectorAll("[data-movers-tab]").forEach(button => {
  button.addEventListener("click", () => {
    state.activeMoversTab = button.dataset.moversTab;
    renderAll();
  });
});

document.getElementById("watchSortButton").addEventListener("click", () => {
  state.sortMode = state.sortMode === "code" ? "name" : "code";
  renderAll();
});

renderAll();
</script>
</body>
